name: Build and Release AppImage

on:
  release:
    types: [created, published]
  workflow_dispatch:  # Allow manual trigger for testing

jobs:
  build-appimage:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
      
      - name: Install Apache Ant
        run: |
          sudo apt-get update
          sudo apt-get install -y ant
      
      - name: Build all components
        run: |
          set -e  # Exit on any error
          echo "Building all JPdfBookmarks components..."
          
          # Build components in order
          # Note: iText-2.1.7-patched uses nbbuild.xml instead of build.xml
          echo "Building iText-2.1.7-patched..."
          cd iText-2.1.7-patched && ant -f nbbuild.xml jar
          if [ ! -f dist/iText-2.1.7-patched.jar ]; then
            echo "ERROR: iText JAR not created!"
            exit 1
          fi
          cd ..
          
          echo "Building Bookmark..."
          cd Bookmark && ant jar
          if [ ! -f dist/Bookmark.jar ]; then
            echo "ERROR: Bookmark JAR not created!"
            exit 1
          fi
          cd ..
          
          echo "Building Colors..."
          cd Colors && ant jar && cd ..
          echo "Building Utilities..."
          cd Utilities && ant jar && cd ..
          echo "Building ResourceHelper..."
          cd ResourceHelper && ant jar && cd ..
          echo "Building CollapsingPanel..."
          cd CollapsingPanel && ant jar && cd ..
          echo "Building jpdfbookmarks_graphics..."
          cd jpdfbookmarks_graphics && ant jar && cd ..
          echo "Building jpdfbookmarks_languages..."
          cd jpdfbookmarks_languages && ant jar && cd ..
          echo "Building iTextBookmarksConverter..."
          cd iTextBookmarksConverter && ant jar && cd ..
          
          echo "Building jpdfbookmarks_core..."
          cd jpdfbookmarks_core && ant jar
          if [ ! -f dist/jpdfbookmarks.jar ]; then
            echo "ERROR: jpdfbookmarks.jar not created!"
            ls -laR dist/ || echo "No dist directory"
            ls -laR build/ || echo "No build directory"
            exit 1
          fi
          cd ..
          
          echo "Build complete!"
          
      - name: Verify build outputs
        run: |
          echo "=== Verifying all JAR files were created ==="
          echo ""
          echo "Required JAR files:"
          for jar in \
            iText-2.1.7-patched/dist/iText-2.1.7-patched.jar \
            Bookmark/dist/Bookmark.jar \
            Colors/dist/Colors.jar \
            Utilities/dist/Utilities.jar \
            ResourceHelper/dist/ResourceHelper.jar \
            CollapsingPanel/dist/CollapsingPanel.jar \
            jpdfbookmarks_graphics/dist/jpdfbookmarks_graphics.jar \
            jpdfbookmarks_languages/dist/jpdfbookmarks_languages.jar \
            iTextBookmarksConverter/dist/iTextBookmarksConverter.jar \
            jpdfbookmarks_core/dist/jpdfbookmarks.jar
          do
            if [ -f "$jar" ]; then
              echo "✓ $jar"
            else
              echo "✗ MISSING: $jar"
              exit 1
            fi
          done
          echo ""
          echo "All required JARs present!"
      
      - name: Download appimagetool
        run: |
          wget -O appimagetool https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          sudo mv appimagetool /usr/local/bin/
      
      - name: Build AppImage
        run: |
          cd Packaging
          ./build-appimage.sh
      
      - name: Get version
        id: version
        run: |
          VERSION=$(sed '/^\#/d' jpdfbookmarks_core/src/it/flavianopetrocchi/jpdfbookmarks/jpdfbookmarks.properties | grep 'VERSION' | tail -n 1 | sed 's/^.*=//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "appimage_name=jpdfbookmarks-${VERSION}-x86_64.AppImage" >> $GITHUB_OUTPUT
      
      - name: Upload AppImage to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: Packaging/${{ steps.version.outputs.appimage_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload AppImage as Artifact (for manual builds)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.appimage_name }}
          path: Packaging/${{ steps.version.outputs.appimage_name }}
          retention-days: 30
